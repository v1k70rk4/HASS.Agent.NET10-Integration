name: Lint with Ruff

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  ruff:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v6"
      - uses: "actions/setup-python@v6"
        with:
          python-version: "3.13"
      - run: "python -m pip install ruff"
      - run: "ruff check custom_components/hass_agent"
